<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cousin Camp Olympics — Science Day · Udvar-Hazy Scavenger Hunt</title>
<style>
  :root{
    --gold:#d4af37; --silver:#aab2bd; --bronze:#cd7f32;
    --blue:#0b5394; --red:#c1272d; --ink:#13233b; --paper:#f7f9fc;
    --space1:#0a1733; --space2:#13245a; --space3:#3a1d6e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    color:var(--ink);overflow-x:hidden;
    background:
      repeating-linear-gradient(0deg, transparent 0 31px, rgba(11,83,147,.04) 31px 32px),
      repeating-linear-gradient(90deg, transparent 0 31px, rgba(11,83,147,.04) 31px 32px),
      linear-gradient(180deg,#dbe8fb 0%, #eef4fc 30%, #f7f9fc 100%);
    min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
  }

  /* ===================== AMBIENT FULL-PAGE FLYERS ===================== */
  .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .lane{position:absolute;left:0;will-change:transform}
  .fly{animation:flyX linear infinite}
  @keyframes flyX{from{transform:translateX(-220px)}to{transform:translateX(115vw)}}
  @keyframes flyXrev{from{transform:translateX(115vw) scaleX(-1)}to{transform:translateX(-220px) scaleX(-1)}}
  .bob{animation:bob 5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  /* ===================== HERO ===================== */
  .hero{position:relative;overflow:hidden;color:#fff;text-align:center;
    padding:30px 16px 46px;
    background:
      radial-gradient(120% 90% at 15% 8%, rgba(120,90,220,.55) 0%, rgba(0,0,0,0) 55%),
      radial-gradient(120% 110% at 88% 100%, rgba(0,150,210,.5) 0%, rgba(0,0,0,0) 60%),
      linear-gradient(160deg,var(--space1) 0%, var(--space2) 55%, var(--space3) 100%);
  }
  .hero .stars{position:absolute;inset:0;z-index:0}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

  .scene{position:absolute;inset:0;z-index:1;pointer-events:none}
  .hero-content{position:relative;z-index:3}
  .rings{font-size:1.6rem;letter-spacing:-7px;margin-bottom:6px;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
  .hero h1{margin:0;font-size:2rem;letter-spacing:1px;text-shadow:0 3px 14px rgba(0,0,0,.5)}
  .hero .tag{display:inline-block;margin-top:8px;padding:5px 16px;border-radius:30px;
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
    font-size:.82rem;letter-spacing:2px;text-transform:uppercase}
  .hero .quip{margin:12px 0 0;font-size:.92rem;color:#bfe0ff;font-style:italic}

  /* planets */
  .planet{position:absolute;border-radius:50%}
  .planet .ring{position:absolute;inset:-32% -55%;border:3px solid rgba(255,255,255,.55);
    border-radius:50%;transform:rotate(-22deg);border-left-color:transparent;border-right-color:transparent}
  .p-saturn{width:64px;height:64px;top:26px;right:8%;
    background:radial-gradient(circle at 35% 32%, #ffd98a, #d98a3a)}
  .p-blue{width:34px;height:34px;top:60%;left:6%;
    background:radial-gradient(circle at 35% 30%, #9fe7ff, #2b7fb8);opacity:.9}

  /* orbit system */
  .orbit{position:absolute;top:34px;left:26%;width:120px;height:120px;
    border:1px dashed rgba(255,255,255,.25);border-radius:50%;animation:spin 16s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .orbit .sat-orb{position:absolute;top:-16px;left:50%;margin-left:-22px;animation:spin 16s linear infinite reverse}

  /* launching rocket + pad */
  .launchpad{position:absolute;bottom:0;left:14%;z-index:2}
  .rocketwrap{position:relative;animation:launch 7s ease-in infinite}
  @keyframes launch{
    0%{transform:translateY(0);opacity:0}
    8%{opacity:1}
    78%{transform:translateY(-300px);opacity:1}
    92%{transform:translateY(-360px);opacity:0}
    100%{transform:translateY(0);opacity:0}
  }
  .flame{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);transform-origin:top center;
    animation:flick .12s steps(2) infinite}
  @keyframes flick{0%{transform:translateX(-50%) scaleY(.8)}100%{transform:translateX(-50%) scaleY(1.15)}}
  .smoke{position:absolute;bottom:2px;left:14%;z-index:1}
  .puff{position:absolute;width:24px;height:24px;border-radius:50%;background:rgba(220,230,245,.5);
    animation:puff 7s ease-out infinite}
  @keyframes puff{0%{transform:scale(.2);opacity:0}10%{opacity:.6}60%{opacity:.35}100%{transform:scale(2.4) translateY(10px);opacity:0}}

  /* telescope + observatory */
  .telescope{position:absolute;bottom:0;right:5%;transform-origin:30% 90%;animation:sway 6s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(3deg)}}
  .dome{position:absolute;bottom:0;right:22%}

  /* shooting star */
  .shoot{position:absolute;width:90px;height:2px;background:linear-gradient(90deg,#fff,rgba(255,255,255,0));
    border-radius:2px;top:18%;left:40%;opacity:0;transform:rotate(20deg);animation:shoot 6s ease-in infinite}
  .shoot.b{top:30%;left:62%;animation-delay:3.2s}
  @keyframes shoot{0%{opacity:0;transform:translate(0,0) rotate(20deg)}
    6%{opacity:1}22%{opacity:0;transform:translate(-260px,95px) rotate(20deg)}100%{opacity:0}}

  .wave{display:block;width:100%;height:30px;margin-top:-1px;position:relative;z-index:2}

  /* ===================== LAYOUT ===================== */
  .wrap{max-width:780px;margin:0 auto;padding:8px 16px 70px;position:relative;z-index:1}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:520px){.cards{grid-template-columns:1fr}}
  .card{
    position:relative;background:rgba(255,255,255,.93);border-radius:18px;padding:18px;cursor:pointer;
    box-shadow:0 6px 22px rgba(11,83,147,.16);border:2px solid transparent;
    transition:transform .15s,border-color .15s,box-shadow .15s;backdrop-filter:blur(2px);overflow:hidden}
  .card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 12px 30px rgba(11,83,147,.22)}
  .card .ic{position:absolute;top:-8px;right:-6px;font-size:3.2rem;opacity:.10;transform:rotate(-12deg)}
  .card h2{margin:0 0 2px;font-size:1.25rem}
  .card .role{font-size:.8rem;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .bar{height:11px;background:#e6ecf5;border-radius:8px;overflow:hidden;margin-top:14px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),#f1d77a);transition:width .5s}
  .card small{display:block;margin-top:7px;color:#5a6b80;font-size:.8rem;font-weight:600}

  .section-h{margin:6px 0 14px;text-align:center}
  .section-h h3{margin:0;font-size:1.05rem;color:var(--blue);letter-spacing:.5px}
  .section-h p{margin:4px 0 0;font-size:.82rem;color:#6b7a90}

  /* HUNT VIEW */
  .back{background:none;border:none;color:var(--blue);font-weight:700;cursor:pointer;font-size:.95rem;padding:8px 0;margin-bottom:2px}
  .hunt-head{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .hunt-head h2{margin:0;font-size:1.5rem}
  .hunt-head .role{font-size:.8rem;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .topbar{position:sticky;top:0;background:rgba(247,249,252,.5);
    padding:10px 8px;margin:0 -8px;border-radius:12px;z-index:5;
    backdrop-filter:blur(12px) saturate(125%);-webkit-backdrop-filter:blur(12px) saturate(125%)}
  .topbar .bar{height:15px}
  .count{font-size:.85rem;color:#5a6b80;margin-top:6px;font-weight:700}
  ul.items{list-style:none;padding:0;margin:16px 0 0}
  li.item{
    background:rgba(255,255,255,.55);border-radius:14px;padding:14px;margin-bottom:10px;
    display:flex;gap:12px;align-items:flex-start;box-shadow:0 4px 18px rgba(11,83,147,.12);
    cursor:pointer;transition:background .15s,transform .1s,border-color .15s;
    border:1.5px solid rgba(255,255,255,.65);
    backdrop-filter:blur(10px) saturate(125%);-webkit-backdrop-filter:blur(10px) saturate(125%)}
  li.item:active{transform:scale(.99)}
  li.item.done{background:rgba(214,243,214,.5);border-color:rgba(150,210,150,.6)}
  .box{flex:0 0 27px;height:27px;border:2.5px solid var(--silver);border-radius:8px;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;transition:.15s}
  li.item.done .box{background:var(--gold);border-color:var(--gold);transform:rotate(8deg) scale(1.05)}
  .txt b{display:block;font-size:1rem;margin-bottom:2px}
  li.item.done .txt b{text-decoration:line-through;color:#7a8aa0}
  .txt span{font-size:.85rem;color:#5a6b80;line-height:1.35}
  .emoji{font-size:1.15rem;margin-right:3px}
  .actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
  .reset{background:none;border:1.5px solid #d7deea;color:#5a6b80;border-radius:20px;padding:8px 18px;font-size:.82rem;cursor:pointer}
  .reset:hover{border-color:var(--red);color:var(--red)}
  .hidden{display:none}

  .win{background:linear-gradient(120deg,var(--gold),#f3df9b);color:#5a4500;border-radius:14px;
    padding:14px;text-align:center;font-weight:700;margin-top:16px;display:none;animation:pop .4s}
  .win.show{display:block}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

  footer{text-align:center;color:#7e8da0;font-size:.74rem;padding:24px 16px}
</style>
</head>
<body>

<div class="ambient" id="ambient" aria-hidden="true"></div>

    <!-- telescope -->
    <svg class="telescope" width="120" height="120" viewBox="0 0 120 120">

    <!-- observatory dome -->
    <svg class="dome" width="92" height="60" viewBox="0 0 92 60">
      <rect x="10" y="44" width="72" height="16" fill="#16264d"/>

  </div>

  <div class="hero-content">
    <div class="rings">🥇 🥈 🥉</div>
    <h1>SCIENCE DAY</h1>
    <div class="tag">Cousin Camp Olympics · June 15</div>
    <p class="quip">“Pocket protectors rule the world” — Steven F. Udvar-Hazy Air &amp; Space Center</p>

  <svg class="wave" viewBox="0 0 1440 40" preserveAspectRatio="none">
    <path d="M0,40 L0,20 C240,40 480,4 720,14 C960,24 1200,40 1440,18 L1440,40 Z" fill="#f7f9fc"/>
  </svg>
</header>

<div class="wrap">
  <div id="hub"></div>
  <div id="hunt" class="hidden"></div>
</div>
<footer>Find the most items to win the day's medal! 🏅 Tap to check things off — your progress saves automatically on this device.</footer>

      {e:"🔃", t:"Find a \"push-pull\" plane with a propeller on BOTH ends.", d:"The Dornier Do 335 'Pfeil'. What does 'Pfeil' mean?"},
      {e:"💥", t:"Find the aircraft that ended WWII in the Pacific.", d:"What city did its mission target?"},
      {e:"🔄", t:"Find a tilt-rotor aircraft.", d:"Explain in one sentence how it's both a plane AND a helicopter."},
      {e:"🚗", t:"Locate an autogiro — an early 'flying car' experiment.", d:"Hint: the AC-35. Why was it built?"},
      {e:"🏺", t:"Find the OLDEST aircraft you can.", d:"Record the year it was built from its placard (check Pre-1920)."},
      {e:"⚙️", t:"Find any aircraft engine and identify its type.", d:"Is it piston, jet, or rocket? Record the model name."},
      {e:"🌍", t:"Riddle: \"Solo, nonstop, no refueling — one pilot circled the whole globe in me in 2005.\"", d:"Name the aircraft AND its pilot."},
      {e:"☁️", t:"Riddle: \"First airliner with a pressurized cabin, 1938, named like a cloud.\"", d:"Identify it. What altitude could it cruise at?"},
      {e:"🐱", t:"Find the F-14 Tomcat.", d:"Read about the 1989 Gulf of Sidra incident — what did it shoot down?"},
      {e:"🛞", t:"Find a German WWII fighter with a round, air-cooled radial engine.", d:"Hint: Focke-Wulf Fw 190. What was its main role?"},
      {e:"🪡", t:"Find a WWI-era aircraft (Pre-1920).", d:"What is its frame made of? (wood, fabric, wire...)"},
      {e:"📐", t:"Find an aircraft with a 'swing wing' (variable geometry).", d:"Explain in one sentence why the wings sweep back."},
      {e:"⚔️", t:"Find one propeller fighter AND one jet fighter.", d:"Name both — they represent two eras of air combat."},
      {e:"📸", t:"Find a reconnaissance aircraft.", d:"Explain how its mission differs from a bomber's."},
      {e:"🛰️", t:"Find a satellite or space probe.", d:"Read what it was built to study or do."},
      {e:"🥊", t:"In the Korea/Vietnam area, find an American jet and its Soviet rival.", d:"Name both (hint: F-86 vs. MiG-15)."}
    ]
  }
};
const ORDER = ["forrest","evrin","geneva","elsie"];

function load(id){ try{return JSON.parse(localStorage.getItem("ch_"+id))||[]}catch(e){return[]} }
function save(id,arr){ localStorage.setItem("ch_"+id, JSON.stringify(arr)) }

function renderHub(){
  const hub=document.getElementById("hub"), hunt=document.getElementById("hunt");
  hunt.classList.add("hidden"); hub.classList.remove("hidden");
  let html=`<div class="section-h"><h3>Choose your camper</h3>
    <p>Four scientists. Four missions. Most objectives found wins today's gold. 🏅</p></div><div class="cards">`;
  ORDER.forEach(id=>{
    const h=HUNTS[id], done=load(id).filter(Boolean).length, tot=h.items.length;
    const pct=Math.round(done/tot*100);
    html+=`<div class="card" onclick="renderHunt('${id}')">
      <span class="ic">${h.ic}</span>
      <div class="role">${h.emoji} ${h.role}</div>
      <h2>${h.name}</h2>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <small>${done} of ${tot} found</small>
    </div>`;
  });
  html+='</div>';
  hub.innerHTML=html;
}

function renderHunt(id){
  const hub=document.getElementById("hub"), hunt=document.getElementById("hunt");
  hub.classList.add("hidden"); hunt.classList.remove("hidden");
  window.scrollTo(0,0);
  const h=HUNTS[id]; let state=load(id);
  if(state.length!==h.items.length){state=new Array(h.items.length).fill(false);save(id,state);}
  const done=state.filter(Boolean).length, tot=h.items.length, pct=Math.round(done/tot*100);
  let html=`<button class="back" onclick="renderHub()">← All campers</button>
    <div class="hunt-head"><div>
      <div class="role">${h.emoji} ${h.role}</div>
      <h2>${h.name}'s Mission</h2>
    </div></div>
    <div class="topbar">
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="count">${done} / ${tot} objectives found</div>
    </div>
    <div class="win ${done===tot?'show':''}">🏅 Clean sweep, ${h.name}! All 20 found — report to Mission Control (Uncle Jared)!</div>
    <ul class="items">`;
  h.items.forEach((it,i)=>{
    html+=`<li class="item ${state[i]?'done':''}" onclick="toggle('${id}',${i})">
      <div class="box">${state[i]?'✓':''}</div>
      <div class="txt"><b><span class="emoji">${it.e}</span>${it.t}</b><span>${it.d}</span></div>
    </li>`;
  });
  html+=`</ul>
    <div class="actions">
      <button class="reset" onclick="resetHunt('${id}')">Reset ${h.name}'s hunt</button>
    </div>`;
  hunt.innerHTML=html;
}

function toggle(id,i){
  const state=load(id); state[i]=!state[i]; save(id,state); renderHunt(id);
}
function resetHunt(id){
  if(confirm("Clear all checkmarks for "+HUNTS[id].name+"?")){
    save(id,new Array(HUNTS[id].items.length).fill(false)); renderHunt(id);
  }
}

/* ---------- twinkling stars ---------- */
function sprinkle(el,n){
  for(let i=0;i<n;i++){
    const s=document.createElement('span'); s.className='star';
    const sz=Math.random()*2+1;
    s.style.width=s.style.height=sz+'px';
    s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
    s.style.animationDelay=(Math.random()*3)+'s';
    el.appendChild(s);
  }
}

/* ---------- ambient flyers across the whole page ---------- */
const PLANE = `<svg width="116" height="40" viewBox="0 0 120 40">
  <path d="M4,21 L1,7 L15,16 Z" fill="#b8c6db"/>
  <path d="M6,21 Q12,13 46,13 L96,14 Q114,15 117,21 Q114,27 96,28 L46,29 Q12,29 6,21 Z" fill="#ffffff" stroke="#c3d0e2" stroke-width="1"/>
  <path d="M52,21 L80,32 L93,32 L70,21 Z" fill="#cfd9e8"/>
  <rect x="34" y="19" width="64" height="3" rx="1.5" fill="#0b5394" opacity=".7"/>
  <g fill="#9fb6d4"><circle cx="40" cy="20" r="1.4"/><circle cx="50" cy="20" r="1.4"/><circle cx="60" cy="20" r="1.4"/><circle cx="70" cy="20" r="1.4"/><circle cx="80" cy="20" r="1.4"/></g>
  <circle cx="113" cy="21" r="2.4" fill="#ff7a1a"/>
</svg>`;
const SAT = `<svg width="70" height="40" viewBox="0 0 120 60">
  <rect x="50" y="20" width="20" height="20" rx="2" fill="#cfe0f5" stroke="#0b5394" stroke-width="3"/>
  <g fill="#1b3c78" stroke="#7fb2ff" stroke-width="2"><rect x="4" y="20" width="38" height="20"/><rect x="78" y="20" width="38" height="20"/></g>
  <line x1="60" y1="20" x2="60" y2="3" stroke="#9fb6d4" stroke-width="2"/><circle cx="60" cy="3" r="4" fill="#ffd23f"/>
</svg>`;

function spawnFlyer(){
  const lane=document.createElement('div'); lane.className='lane';
  const isSat=Math.random()<0.28;
  const rev=Math.random()<0.45;
  const dur=(isSat?38:20)+Math.random()*16;
  const top=8+Math.random()*78;            // vh
  const scale=(isSat?0.7:0.6)+Math.random()*0.6;
  lane.style.top=top+'vh';
  lane.style.opacity=(isSat?0.35:0.5);
  lane.style.animation=`${rev?'flyXrev':'flyX'} ${dur}s linear forwards`;
  const inner=document.createElement('div');
  inner.className='bob';
  inner.style.animationDuration=(3.5+Math.random()*3)+'s';
  inner.style.transform=`scale(${scale})`;
  inner.innerHTML=isSat?SAT:PLANE;
  lane.appendChild(inner);
  document.getElementById('ambient').appendChild(lane);
  setTimeout(()=>lane.remove(), dur*1000+200);
}

document.addEventListener('DOMContentLoaded',()=>{
  sprinkle(document.getElementById('heroStars'),70);
  renderHub();
  // initial wave + steady stream of flyers
  for(let i=0;i<4;i++) setTimeout(spawnFlyer, i*1800);
  setInterval(spawnFlyer, 3600);
});
</script>
