<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Ceremony · Parade of Athletes — Cousin Camp Olympics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#d4af37; --gold-lt:#f3df9b; --blue:#0b5394; --blue-dk:#072744;
    --ink:#10243f; --paper:#f4f8fe;
    --olympic:'Anton','Arial Narrow',Impact,sans-serif;
    --body:'Oswald','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:var(--body);color:var(--ink);
    background:#eaf1fb;overflow-x:hidden}

  /* ===== HERO ===== */
  .hero{position:relative;color:#fff;text-align:center;overflow:hidden;
    padding:22px 16px 30px;
    background:linear-gradient(165deg,#0a2f5c 0%,#0b5394 48%,#0d6bb8 100%)}
  .hero::before,.hero::after{content:"";position:absolute;border-radius:50%;
    filter:blur(60px);opacity:.4;animation:drift 16s ease-in-out infinite}
  .hero::before{width:340px;height:340px;background:#1f8fff;top:-120px;left:-80px}
  .hero::after{width:300px;height:300px;background:#ffd86b;bottom:-60px;right:-70px;animation-delay:-8s}
  @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(36px,26px)}}

  .home{position:absolute;top:14px;left:14px;z-index:30;color:#eaf3ff;text-decoration:none;
    font-size:.84rem;font-weight:700;background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.28);padding:6px 14px;border-radius:30px;
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);transition:.2s}
  .home:hover{background:rgba(255,255,255,.26)}

  .rings{position:relative;height:50px;margin:4px auto 10px;width:90px}
  .rings span{position:absolute;width:33px;height:33px;border:5px solid;border-radius:50%}
  .rings span:nth-child(1){border-color:#0081c8;left:0;top:0}
  .rings span:nth-child(2){border-color:#000;left:28px;top:0}
  .rings span:nth-child(3){border-color:#ee334e;left:56px;top:0}
  .rings span:nth-child(4){border-color:#fcb131;left:14px;top:17px}
  .rings span:nth-child(5){border-color:#00a651;left:42px;top:17px}

  .label{font-size:.74rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;opacity:.85;margin:0}
  .hero h1{font-family:var(--olympic);margin:6px 0 0;font-size:3rem;line-height:.95;
    letter-spacing:2px;text-transform:uppercase;text-shadow:0 4px 20px rgba(0,0,0,.4)}
  .hero p.sub{margin:10px 0 0;font-size:1rem;opacity:.94;font-weight:400}

  /* ===== DECK ===== */
  .wrap{max-width:1040px;margin:0 auto;padding:34px 16px 70px}
  .deck{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  @media(max-width:880px){.deck{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:430px){.deck{grid-template-columns:1fr}}

  .flip{perspective:1400px;height:340px;cursor:pointer}
  .flip-inner{position:relative;width:100%;height:100%;
    transition:transform .75s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d}
  .flip.is-flipped .flip-inner{transform:rotateY(180deg)}

  .face{position:absolute;inset:0;border-radius:22px;overflow:hidden;
    -webkit-backface-visibility:hidden;backface-visibility:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:22px;text-align:center;box-shadow:0 8px 28px rgba(11,83,147,.18)}

  /* FRONT */
  .front{color:#fff}
  .front::after{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 50% 18%,rgba(255,255,255,.28),transparent 55%)}
  .front .num{font-family:var(--olympic);position:absolute;top:10px;right:16px;
    font-size:2.4rem;opacity:.22;letter-spacing:1px}
  .front .mini-rings{font-size:1.1rem;letter-spacing:-4px;opacity:.9;margin-bottom:14px;z-index:1}
  .front .name{font-family:var(--olympic);font-size:2.7rem;line-height:.94;
    letter-spacing:1.5px;text-transform:uppercase;z-index:1;text-shadow:0 3px 12px rgba(0,0,0,.3)}
  .front .athlete{font-size:.72rem;letter-spacing:2.5px;text-transform:uppercase;
    opacity:.85;margin-top:10px;z-index:1}
  .front .tapcue{position:absolute;bottom:16px;left:0;right:0;font-size:.72rem;
    letter-spacing:1.5px;text-transform:uppercase;opacity:.8;z-index:1;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .front .tapcue .spin{animation:spin 5s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* BACK — full-bleed emblem image with overlay */
  .back{transform:rotateY(180deg);color:#fff;padding:0;justify-content:space-between;
    background-size:cover;background-position:center;background-repeat:no-repeat}
  /* legibility scrims top + bottom, drawn over the image */
  .back::before{content:"";position:absolute;inset:0;z-index:0;
    background:linear-gradient(180deg,rgba(8,20,38,.72) 0%,rgba(8,20,38,0) 26%,
      rgba(8,20,38,0) 42%,rgba(8,20,38,.55) 66%,rgba(8,20,38,.92) 100%)}
  .back .emoji-badge{position:absolute;top:12px;left:14px;z-index:2;font-size:1.5rem;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))}
  .back .who{position:relative;z-index:2;font-family:var(--olympic);font-size:1.2rem;
    letter-spacing:1.5px;text-transform:uppercase;padding:14px 16px 0;
    text-shadow:0 2px 8px rgba(0,0,0,.6);width:100%;text-align:center}
  .back .lower{position:relative;z-index:2;width:100%;padding:0 16px 16px;text-align:center}
  .back .beast{font-family:var(--olympic);font-size:1.9rem;letter-spacing:1px;
    text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,.7);margin-bottom:10px}
  .back .traits{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px}
  .back .traits li{display:flex;align-items:center;justify-content:center;gap:9px;
    font-size:.95rem;font-weight:600;text-shadow:0 1px 6px rgba(0,0,0,.85)}
  .back .traits .lr{font-size:1rem}
  .back .flipback{position:relative;z-index:2;font-size:.66rem;letter-spacing:1.5px;
    text-transform:uppercase;opacity:.85;padding:9px 0 13px;text-shadow:0 1px 5px rgba(0,0,0,.8)}

  .flip:hover .face{box-shadow:0 16px 40px rgba(11,83,147,.28)}

  footer{text-align:center;color:#7e8da2;font-size:.78rem;padding:10px 16px 44px;line-height:1.6}
  footer .mini{font-size:1rem;letter-spacing:-5px;display:block;margin-bottom:8px;opacity:.8}
</style>
</head>
<body>

<header class="hero">
  <a class="home" href="../index.html">← Camp Home</a>
  <div class="rings"><span></span><span></span><span></span><span></span><span></span></div>
  <p class="label">Opening Ceremony · June 14</p>
  <h1>Parade of Athletes</h1>
  <p class="sub">Tap each athlete to reveal their mythic spirit beast 🔥</p>
</header>

<main class="wrap">
  <div class="deck" id="deck"></div>
</main>

<footer>
  <span class="mini">🥇 🥈 🥉</span>
  Every champion has a beast within · Cousin Camp Olympics 2026
</footer>

<script>
/* Edit beasts & traits freely — we'll refine these as we go. */
const ATHLETES = [
  {
    name:"Elsie", beast:"Phoenix", emoji:"🔥",
    front:"linear-gradient(150deg,#c1272d,#f0682b)",
    crest:"linear-gradient(120deg,#a81d23,#e0552a)",
    img:"images/elsie-phoenix.png",
    traits:["Fearless leader","Brilliant mind","Rises to any challenge"]
  },
  {
    name:"Evrin", beast:"Griffin", emoji:"🦅",
    front:"linear-gradient(150deg,#0b5394,#0d8fd8)",
    crest:"linear-gradient(120deg,#073f73,#0d6bb8)",
    img:"images/evrin-griffin.png",
    traits:["Brave-hearted","Fiercely loyal","Quick & sharp-witted"]
  },
  {
    name:"Geneva", beast:"Dragon", emoji:"🐉",
    front:"linear-gradient(150deg,#1f7a4d,#3cb371)",
    crest:"linear-gradient(120deg,#155f3b,#2e9d5f)",
    img:"images/geneva-dragon.png",
    traits:["Bold & daring","Wildly creative","Magnetic spirit"]
  },
  {
    name:"Forrest", beast:"Pegasus", emoji:"🦄",
    front:"linear-gradient(150deg,#5b3a8e,#8a64c9)",
    crest:"linear-gradient(120deg,#472d70,#7654b8)",
    img:"images/forrest-pegasus.png",
    traits:["Free-spirited adventurer","Kind-hearted","Swift as the wind"]
  },
  {
    name:"Brittany", beast:"Gnome Queen", emoji:"👑", team:"Mysterious Interloper",
    front:"linear-gradient(150deg,#a01a6d,#e35aa6)",
    crest:"linear-gradient(120deg,#7d1455,#cf4f95)",
    img:"images/brittany-gnome-queen.png",
    traits:["Rules with a kind heart","Keeper of cozy magic","Commands a mushroom court"]
  },
  {
    name:"Nate", beast:"Fluffy Cerberus", emoji:"🐶", team:"Mysterious Interloper",
    front:"linear-gradient(150deg,#c77f0a,#f0b03b)",
    crest:"linear-gradient(120deg,#9c6207,#e09a2c)",
    img:"images/nate-protector.png",
    traits:["Protector of the realm","Fearsome… ly soft","Guards you, then naps"]
  },
  {
    name:"Julia", beast:"The Unseen Legend", emoji:"🏰", team:"Sir Not Appearing in this Film",
    front:"linear-gradient(150deg,#5a6b80,#9aa9bc)",
    crest:"linear-gradient(120deg,#46566b,#7d8da0)",
    traits:["Always just off-screen","Legendary yet elusive","Here in spirit"]
  },
  {
    name:"Jared", beast:"Mad Alchemist", emoji:"🧪", team:"Mysterious Interloper",
    front:"linear-gradient(150deg,#0e7c86,#28cabc)",
    crest:"linear-gradient(120deg,#0a5a61,#18a99c)",
    img:"images/jared-alchemist.png",
    traits:["Bubbling with wild ideas","Dangerously curious","Goggles never come off"]
  }
];

const deck = document.getElementById("deck");
ATHLETES.forEach((a,i)=>{
  const card = document.createElement("div");
  card.className = "flip";
  card.setAttribute("role","button");
  card.setAttribute("tabindex","0");
  card.setAttribute("aria-label", a.name + " — tap to reveal spirit beast");
  card.innerHTML = `
    <div class="flip-inner">
      <div class="face front" style="background:${a.front}">
        ${a.team ? "" : '<span class="mini-rings">🥇 🥈 🥉</span>'}
        <span class="name">${a.name}</span>
        <span class="athlete">${a.team || "Team Cousin Camp"}</span>
        <span class="tapcue"><span class="spin">🏅</span> Tap to reveal</span>
      </div>
      <div class="face back" style="background-image:${a.img ? `url('${encodeURI(a.img)}'),` : ""}${a.crest}">
        <span class="emoji-badge">${a.emoji}</span>
        <div class="who">${a.name}</div>
        <div class="lower">
          <div class="beast">The ${a.beast}</div>
          <ul class="traits">
            ${a.traits.map(t=>`<li><span class="lr">🏅</span><span>${t}</span></li>`).join("")}
          </ul>
          <div class="flipback">↺ Tap to flip back</div>
        </div>
      </div>
    </div>`;
  const toggle = ()=> card.classList.toggle("is-flipped");
  card.addEventListener("click", toggle);
  card.addEventListener("keydown", e=>{
    if(e.key==="Enter" || e.key===" "){ e.preventDefault(); toggle(); }
  });
  deck.appendChild(card);
});
</script>
</body>
</html>
